name: outcall
description: OUTCALL — the ultimate hunting call training app.
publish_to: 'none'
version: 2.0.0+40

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.2.1
  
  # Functional Programming (Either, Result types)
  fpdart: ^1.1.0
  riverpod_annotation: ^4.0.2
  
  # Core Utilities
  equatable: ^2.0.5
  
  # Audio
  record: ^6.2.0
  audioplayers: ^6.0.0
  permission_handler: ^12.0.1
  
  # UI
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.7
  intl: ^0.20.2
  
  # Backend / Data
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_crashlytics: ^5.0.7
  cloud_functions: ^6.0.6
  firebase_storage: ^13.0.6
  json_annotation: ^4.8.1
  fftea: ^1.5.0+1
  tflite_flutter: ^0.12.1
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  sqflite: ^2.3.0
  package_info_plus: ^9.0.0
  path: ^1.9.0
  firedart: ^0.9.8
  in_app_purchase: ^3.1.13

  sqflite_common_ffi: any
  geolocator: ^14.0.2
  share_plus: ^12.0.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  http: ^1.6.0
  uuid: ^4.0.0
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^12.3.0
  firebase_remote_config: ^6.1.4
  connectivity_plus: ^7.0.0
  firebase_app_check: ^0.4.1+4
  sign_in_with_apple: ^7.0.1
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.4
  firebase_messaging: ^16.1.2
  firebase_analytics: ^12.1.3
  in_app_review: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6

  json_serializable: ^6.7.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    # Audio files — directory glob includes all .mp3 files automatically
    - assets/audio/
    - assets/images/
    - assets/images/animals/
    - assets/data/
    - assets/models/
# Pinned overrides — record_linux 1.3.0 is required because later versions
# have a breaking change in the audio stream API that causes recording to fail
# on Ubuntu 22.04+. Remove this override when record_linux 1.4+ is released
# with the fix. Last checked: March 2026.
dependency_overrides:
  record_linux: 1.3.0
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/app_icon.png"
