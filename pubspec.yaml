name: outcall
description: OUTCALL — the ultimate hunting call training app.
publish_to: 'none'
version: 1.6.0+23

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Functional Programming (Either, Result types)
  fpdart: ^1.1.0
  riverpod_annotation: ^2.3.5
  provider: ^6.0.0  # Keep during migration
  
  # Core Utilities
  equatable: ^2.0.5
  get_it: ^9.2.0
  
  # Audio
  record: ^5.1.0
  audioplayers: ^6.0.0
  permission_handler: ^12.0.1
  
  # UI
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.7
  intl: ^0.18.0
  
  # Backend / Data
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.4
  cloud_firestore: ^5.6.2
  firebase_crashlytics: ^4.3.2
  firebase_storage: ^12.4.4
  json_annotation: ^4.8.1
  fftea: ^1.5.0+1
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  sqflite: ^2.3.0
  package_info_plus: ^8.2.1
  path: ^1.9.0
  firedart: ^0.9.8

  sqflite_common_ffi: any
  geolocator: 13.0.4
  share_plus: ^12.0.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  http: ^1.6.0
  uuid: ^4.0.0
  url_launcher: ^6.3.2
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^11.3.0
  firebase_remote_config: ^5.5.0
  connectivity_plus: ^7.0.0
  firebase_app_check: ^0.3.2+10
  sign_in_with_apple: ^7.0.1
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.4.3
  json_serializable: ^6.7.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

