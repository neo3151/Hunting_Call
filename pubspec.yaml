name: hunting_calls_perfection
description: Outcall — the ultimate hunting call training app.
publish_to: 'none'
version: 1.5.1+17

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Functional Programming (Either, Result types)
  fpdart: ^1.1.0
  riverpod_annotation: ^2.3.5
  provider: ^6.0.0  # Keep during migration
  
  # Core Utilities
  equatable: ^2.0.5
  get_it: ^9.2.0
  
  # Audio
  record: ^5.1.0
  audioplayers: ^6.0.0
  permission_handler: ^12.0.1
  
  # UI
  google_fonts: ^6.3.0
  flutter_svg: ^2.0.7
  intl: ^0.18.0
  
  # Backend / Data
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.4
  cloud_firestore: ^5.6.2
  firebase_crashlytics: ^4.3.2
  firebase_storage: ^12.4.4
  json_annotation: ^4.8.1
  fftea: ^1.5.0+1
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  sqflite: ^2.3.0
  package_info_plus: ^8.2.1
  path: ^1.9.0
  firedart: ^0.9.8

  sqflite_common_ffi: any
  geolocator: 13.0.4
  share_plus: ^12.0.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  http: ^1.6.0
  uuid: ^4.0.0
  url_launcher: ^6.3.2
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.4.3
  json_serializable: ^6.7.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    # Free-tier audio (bundled in APK). Paid calls download from Firebase Storage.
    - assets/audio/duck_mallard_greeting.mp3
    - assets/audio/duck_mallard_greeting_v2.mp3
    - assets/audio/goose_canadian_honk.mp3
    - assets/audio/wood_duck.mp3
    - assets/audio/deer_buck_grunt.mp3
    - assets/audio/deer_doe_bleat.mp3
    - assets/audio/cougar.mp3
    - assets/audio/coyote_howl.mp3
    - assets/audio/rabbit_distress.mp3
    - assets/audio/fox_scream.mp3
    - assets/audio/turkey_gobble.mp3
    - assets/audio/crow.mp3
    - assets/audio/dove.mp3
    - assets/audio/owl_barred_hoot.mp3
    - assets/audio/coyote_yip.mp3
    - assets/audio/awebo.mp3
    - assets/images/
    - assets/images/animals/
    - assets/data/
dependency_overrides:
  record_linux: 1.3.0
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/app_icon.png"
