name: Deploy Release to Play Store

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags: v1.8.3, v2.0.0, etc.

env:
  JAVA_VERSION: '17'
  FLUTTER_CHANNEL: 'stable'

jobs:
  # ── Gate: Analyze + Test ──────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Install Dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run Tests
        run: flutter test

  # ── Build + Deploy to Play Store ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: write  # Needed for GitHub Release creation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # Restore secrets
      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Restore Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      - name: Install Dependencies
        run: flutter pub get

      # Build release AAB with obfuscation
      - name: Build Release AAB
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols

      # Upload to Play Store alpha track
      - name: Upload to Play Store (Alpha)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.neo3151.huntingcalls
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed
          releaseName: ${{ github.ref_name }}
          whatsNewDirectory: distribution/whatsnew

      # Save AAB as GitHub artifact
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Create a GitHub Release with the tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/app/outputs/bundle/release/app-release.aab
