name: OUTCALL CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Setup Java required for Android builds
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # Install Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      # Resolve dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Statically analyze the Dart code for any syntax or logic errors
      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

      # Run all unit and widget tests
      - name: Run Tests
        run: flutter test

      # (Optional) Verify that the Android App Bundle can successfully compile
      - name: Build AAB (Dry Run)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols
