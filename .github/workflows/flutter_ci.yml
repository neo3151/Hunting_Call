name: OUTCALL CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Setup Java required for Android builds
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # Install Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Restore google-services.json from GitHub Secret
      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      # Resolve dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Statically analyze the Dart code for any syntax or logic errors
      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

      # Run all unit and widget tests with coverage
      - name: Run Tests with Coverage
        run: flutter test --coverage

      # Check coverage threshold (fail if below 60%)
      - name: Check Coverage Threshold
        run: |
          TOTAL=$(grep -oP 'LF:\K[0-9]+' coverage/lcov.info | paste -sd+ | bc)
          COVERED=$(grep -oP 'LH:\K[0-9]+' coverage/lcov.info | paste -sd+ | bc)
          PERCENT=$(echo "scale=1; $COVERED * 100 / $TOTAL" | bc)
          echo "Coverage: $PERCENT% ($COVERED / $TOTAL lines)"
          if (( $(echo "$PERCENT < 60" | bc -l) )); then
            echo "::error::Test coverage $PERCENT% is below the 60% threshold"
            exit 1
          fi


  build-windows:
    runs-on: windows-latest
    needs: analyze-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: outcall-windows-build
          path: build/windows/x64/runner/Release/
          retention-days: 14
